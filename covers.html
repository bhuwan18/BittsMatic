<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>BittsMatic — Game Covers</title>
  <style>
    body {
      background: #0a0f14;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      padding: 48px 32px;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      color: #8ab0c4;
    }
    h2 { margin: 0 0 8px; font-size: 13px; letter-spacing: .1em; text-transform: uppercase; }
    .cover-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════
     LANDSCAPE  1280 × 720
═══════════════════════════════════════════════════════════════ -->
<div class="cover-wrap">
  <h2>Landscape — 1280 × 720</h2>
  <svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
    <defs>
      <!-- Background gradient -->
      <linearGradient id="bg-ls" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%"  stop-color="#0b1f2e"/>
        <stop offset="55%" stop-color="#12354f"/>
        <stop offset="100%" stop-color="#0b2233"/>
      </linearGradient>
      <!-- Glow for items -->
      <filter id="glow-gold" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-green" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-red" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="8" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-blue" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <!-- Grid clip -->
      <clipPath id="scene-ls"><rect x="480" y="0" width="800" height="720"/></clipPath>
      <!-- Left panel clip -->
      <clipPath id="left-ls"><rect x="0" y="0" width="520" height="720"/></clipPath>
      <!-- Left panel fade -->
      <linearGradient id="fade-ls" x1="0" y1="0" x2="1" y2="0">
        <stop offset="60%" stop-color="#0b1f2e" stop-opacity="1"/>
        <stop offset="100%" stop-color="#0b1f2e" stop-opacity="0"/>
      </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1280" height="720" fill="url(#bg-ls)"/>

    <!-- Grid dots / lines over full canvas -->
    <g opacity="0.13" stroke="#5cb2e0" stroke-width="0.5">
      <!-- Vertical lines every 40px -->
      <line x1="480" y1="0" x2="480" y2="720"/>
      <line x1="520" y1="0" x2="520" y2="720"/>
      <line x1="560" y1="0" x2="560" y2="720"/>
      <line x1="600" y1="0" x2="600" y2="720"/>
      <line x1="640" y1="0" x2="640" y2="720"/>
      <line x1="680" y1="0" x2="680" y2="720"/>
      <line x1="720" y1="0" x2="720" y2="720"/>
      <line x1="760" y1="0" x2="760" y2="720"/>
      <line x1="800" y1="0" x2="800" y2="720"/>
      <line x1="840" y1="0" x2="840" y2="720"/>
      <line x1="880" y1="0" x2="880" y2="720"/>
      <line x1="920" y1="0" x2="920" y2="720"/>
      <line x1="960" y1="0" x2="960" y2="720"/>
      <line x1="1000" y1="0" x2="1000" y2="720"/>
      <line x1="1040" y1="0" x2="1040" y2="720"/>
      <line x1="1080" y1="0" x2="1080" y2="720"/>
      <line x1="1120" y1="0" x2="1120" y2="720"/>
      <line x1="1160" y1="0" x2="1160" y2="720"/>
      <line x1="1200" y1="0" x2="1200" y2="720"/>
      <line x1="1240" y1="0" x2="1240" y2="720"/>
      <!-- Horizontal lines every 40px -->
      <line x1="480" y1="0"   x2="1280" y2="0"/>
      <line x1="480" y1="40"  x2="1280" y2="40"/>
      <line x1="480" y1="80"  x2="1280" y2="80"/>
      <line x1="480" y1="120" x2="1280" y2="120"/>
      <line x1="480" y1="160" x2="1280" y2="160"/>
      <line x1="480" y1="200" x2="1280" y2="200"/>
      <line x1="480" y1="240" x2="1280" y2="240"/>
      <line x1="480" y1="280" x2="1280" y2="280"/>
      <line x1="480" y1="320" x2="1280" y2="320"/>
      <line x1="480" y1="360" x2="1280" y2="360"/>
      <line x1="480" y1="400" x2="1280" y2="400"/>
      <line x1="480" y1="440" x2="1280" y2="440"/>
      <line x1="480" y1="480" x2="1280" y2="480"/>
      <line x1="480" y1="520" x2="1280" y2="520"/>
      <line x1="480" y1="560" x2="1280" y2="560"/>
      <line x1="480" y1="600" x2="1280" y2="600"/>
      <line x1="480" y1="640" x2="1280" y2="640"/>
      <line x1="480" y1="680" x2="1280" y2="680"/>
      <line x1="480" y1="720" x2="1280" y2="720"/>
    </g>

    <!-- ── FACTORY SCENE (right side, tile=40px) ── -->
    <!-- Origin: top-left at (500, 100), 8 columns × 13 rows of 40px tiles -->
    <!--
      Layout (col, row):
      Source1 at (0,2)  → belts right → Add1 at (3,2–3)
      Source2 at (0,6)  → belts right → Add1 (second input at 3,3)
      Add1 output → belts right → Mul at (6,2–3)
      Source3 at (0,10) → belts right ↑ → Mul (second input at 6,3)
      Mul output → belts right → CORE 3×3 at (10,1)–(12,3)
    -->

    <!-- Tile helper: tile at col c, row r = x=500+c*40, y=100+r*40, size 40×40 -->

    <!-- Belt tiles: col 1,2 row 2 (Source1 → Add) -->
    <g fill="#0d1a21" stroke="#15242b" stroke-width="1">
      <!-- Row 2 belts (Source1 path) -->
      <rect x="540" y="180" width="40" height="40" rx="2"/>
      <rect x="580" y="180" width="40" height="40" rx="2"/>
      <!-- Row 6 belts (Source2 path) -->
      <rect x="540" y="340" width="40" height="40" rx="2"/>
      <rect x="580" y="340" width="40" height="40" rx="2"/>
      <!-- Row 3 belt col 1 (merge col) -->
      <rect x="540" y="220" width="40" height="40" rx="2"/>
      <rect x="540" y="260" width="40" height="40" rx="2"/>
      <rect x="540" y="300" width="40" height="40" rx="2"/>
      <!-- After Add1: row 2 cols 5 -->
      <rect x="700" y="180" width="40" height="40" rx="2"/>
      <rect x="740" y="180" width="40" height="40" rx="2"/>
      <!-- Row 10 belts (Source3 path) -->
      <rect x="540" y="500" width="40" height="40" rx="2"/>
      <rect x="580" y="500" width="40" height="40" rx="2"/>
      <!-- Vertical belt from row 10 up to row 3 (col 3) -->
      <rect x="620" y="220" width="40" height="40" rx="2"/>
      <rect x="620" y="260" width="40" height="40" rx="2"/>
      <rect x="620" y="300" width="40" height="40" rx="2"/>
      <rect x="620" y="340" width="40" height="40" rx="2"/>
      <rect x="620" y="380" width="40" height="40" rx="2"/>
      <rect x="620" y="420" width="40" height="40" rx="2"/>
      <rect x="620" y="460" width="40" height="40" rx="2"/>
      <rect x="620" y="500" width="40" height="40" rx="2"/>
      <!-- After Mul: rows 2 cols 9 -->
      <rect x="860" y="180" width="40" height="40" rx="2"/>
      <rect x="900" y="180" width="40" height="40" rx="2"/>
      <rect x="940" y="180" width="40" height="40" rx="2"/>
    </g>

    <!-- Belt arrows (direction indicators) -->
    <g fill="#2a4a5a" font-family="sans-serif" font-size="16" text-anchor="middle" dominant-baseline="central">
      <text x="560" y="200">▶</text><text x="600" y="200">▶</text>
      <text x="560" y="360">▶</text><text x="600" y="360">▶</text>
      <text x="560" y="240">▼</text><text x="560" y="280">▼</text><text x="560" y="320">▼</text>
      <text x="720" y="200">▶</text><text x="760" y="200">▶</text>
      <text x="560" y="520">▶</text><text x="600" y="520">▶</text>
      <text x="640" y="240">▲</text><text x="640" y="280">▲</text><text x="640" y="320">▲</text>
      <text x="640" y="360">▲</text><text x="640" y="400">▲</text><text x="640" y="440">▲</text>
      <text x="640" y="480">▲</text><text x="640" y="520">▲</text>
      <text x="880" y="200">▶</text><text x="920" y="200">▶</text><text x="960" y="200">▶</text>
    </g>

    <!-- SOURCE machines -->
    <!-- Source1: col 0, row 2 = x=500,y=180 -->
    <g filter="url(#glow-blue)">
      <rect x="500" y="180" width="40" height="40" rx="4" fill="#12bfc8" stroke="#02191d" stroke-width="1.5"/>
      <text x="520" y="200" text-anchor="middle" dominant-baseline="central" fill="#fff" font-family="sans-serif" font-size="11" font-weight="700">SRC</text>
    </g>
    <!-- Source2: col 0, row 6 = x=500,y=340 -->
    <g filter="url(#glow-blue)">
      <rect x="500" y="340" width="40" height="40" rx="4" fill="#12bfc8" stroke="#02191d" stroke-width="1.5"/>
      <text x="520" y="360" text-anchor="middle" dominant-baseline="central" fill="#fff" font-family="sans-serif" font-size="11" font-weight="700">SRC</text>
    </g>
    <!-- Source3: col 0, row 10 = x=500,y=500 -->
    <g filter="url(#glow-blue)">
      <rect x="500" y="500" width="40" height="40" rx="4" fill="#12bfc8" stroke="#02191d" stroke-width="1.5"/>
      <text x="520" y="520" text-anchor="middle" dominant-baseline="central" fill="#fff" font-family="sans-serif" font-size="11" font-weight="700">SRC</text>
    </g>

    <!-- ADD machine: 2-wide, cols 3–4, rows 2–3 = x=620,y=180,w=80,h=80 -->
    <g filter="url(#glow-green)">
      <rect x="620" y="180" width="80" height="40" rx="4" fill="#42dc1c" stroke="#061805" stroke-width="1.5"/>
      <text x="660" y="197" text-anchor="middle" dominant-baseline="central" fill="#071208" font-family="sans-serif" font-size="22" font-weight="900">+</text>
    </g>
    <!-- ADD machine bottom input port indicator -->
    <rect x="620" y="212" width="6" height="8" rx="1" fill="#061805" opacity="0.6"/>

    <!-- MUL machine: 2-wide, cols 7–8, rows 2–3 = x=780,y=180,w=80,h=40 -->
    <g filter="url(#glow-green)">
      <rect x="780" y="180" width="80" height="40" rx="4" fill="#42dc1c" stroke="#061805" stroke-width="1.5"/>
      <text x="820" y="197" text-anchor="middle" dominant-baseline="central" fill="#071208" font-family="sans-serif" font-size="20" font-weight="900">×</text>
    </g>

    <!-- CORE machine: 3×3 at cols 10–12, rows 1–3 = x=900,y=140,w=120,h=120 -->
    <g filter="url(#glow-red)">
      <rect x="960" y="140" width="120" height="120" rx="6" fill="#bd1823" stroke="#2b0508" stroke-width="2"/>
      <!-- Inner panel -->
      <rect x="974" y="154" width="92" height="92" rx="4" fill="#8c1018" stroke="#3d0608" stroke-width="1"/>
      <text x="1020" y="192" text-anchor="middle" dominant-baseline="central" fill="#fff" font-family="sans-serif" font-size="13" font-weight="700" letter-spacing="0.05em">CORE</text>
      <!-- Target value display -->
      <rect x="985" y="206" width="70" height="26" rx="3" fill="#0a0000" stroke="#5a0008" stroke-width="1"/>
      <text x="1020" y="219" text-anchor="middle" dominant-baseline="central" fill="#ff9999" font-family="ui-monospace, monospace" font-size="13" font-weight="700">= 144</text>
    </g>

    <!-- ITEMS (numbers on belts) -->
    <!-- Item "3" on belt at col1,row2 -->
    <g filter="url(#glow-gold)">
      <circle cx="560" cy="200" r="12" fill="#c8b400" stroke="#1a1500" stroke-width="1.5"/>
      <text x="560" y="200" text-anchor="middle" dominant-baseline="central" fill="#fff" font-family="ui-monospace,monospace" font-size="11" font-weight="700">3</text>
    </g>
    <!-- Item "6" on belt col2,row2 -->
    <g filter="url(#glow-gold)">
      <circle cx="600" cy="200" r="12" fill="#c8b400" stroke="#1a1500" stroke-width="1.5"/>
      <text x="600" y="200" text-anchor="middle" dominant-baseline="central" fill="#fff" font-family="ui-monospace,monospace" font-size="11" font-weight="700">6</text>
    </g>
    <!-- Item "6" leaving Source2 -->
    <g filter="url(#glow-gold)">
      <circle cx="560" cy="360" r="12" fill="#c8b400" stroke="#1a1500" stroke-width="1.5"/>
      <text x="560" y="360" text-anchor="middle" dominant-baseline="central" fill="#fff" font-family="ui-monospace,monospace" font-size="11" font-weight="700">6</text>
    </g>
    <!-- Item "9" coming out of Add -->
    <g filter="url(#glow-gold)">
      <circle cx="720" cy="200" r="13" fill="#d1c400" stroke="#1a1500" stroke-width="1.5"/>
      <text x="720" y="200" text-anchor="middle" dominant-baseline="central" fill="#fff" font-family="ui-monospace,monospace" font-size="11" font-weight="700">9</text>
    </g>
    <!-- Item "16" on belt after Mul -->
    <g filter="url(#glow-gold)">
      <circle cx="880" cy="200" r="14" fill="#d1c400" stroke="#1a1500" stroke-width="1.5"/>
      <text x="880" y="200" text-anchor="middle" dominant-baseline="central" fill="#fff" font-family="ui-monospace,monospace" font-size="10" font-weight="700">144</text>
    </g>
    <!-- Source3 emitting "4" -->
    <g filter="url(#glow-gold)">
      <circle cx="560" cy="520" r="12" fill="#c8b400" stroke="#1a1500" stroke-width="1.5"/>
      <text x="560" y="520" text-anchor="middle" dominant-baseline="central" fill="#fff" font-family="ui-monospace,monospace" font-size="11" font-weight="700">4</text>
    </g>

    <!-- Victory spark when 144 hits core -->
    <g opacity="0.8">
      <circle cx="1020" cy="200" r="22" fill="none" stroke="#ff6666" stroke-width="2" opacity="0.5"/>
      <circle cx="1020" cy="200" r="34" fill="none" stroke="#ff3333" stroke-width="1" opacity="0.3"/>
    </g>

    <!-- Particle sparks at Add machine -->
    <g fill="#85f560" opacity="0.7">
      <circle cx="665" cy="174" r="2.5"/>
      <circle cx="680" cy="169" r="2"/>
      <circle cx="650" cy="171" r="2"/>
    </g>

    <!-- ── LEFT PANEL ── -->
    <!-- Dark overlay with fade at right edge -->
    <rect x="0" y="0" width="560" height="720" fill="url(#fade-ls)"/>

    <!-- Subtle accent line -->
    <rect x="0" y="0" width="3" height="720" fill="#5cb2e0" opacity="0.6"/>

    <!-- Pill tag: "FACTORY PUZZLE" -->
    <rect x="52" y="192" width="148" height="24" rx="12" fill="rgba(92,178,224,0.12)" stroke="rgba(92,178,224,0.35)" stroke-width="1"/>
    <text x="126" y="204" text-anchor="middle" dominant-baseline="central" fill="#5cb2e0" font-family="Inter,ui-sans-serif,sans-serif" font-size="11" font-weight="600" letter-spacing="0.12em">FACTORY PUZZLE</text>

    <!-- Title -->
    <text x="52" y="290" fill="#edf4f7" font-family="Inter,ui-sans-serif,sans-serif" font-size="72" font-weight="900" letter-spacing="-2">Bitts</text>
    <text x="52" y="370" fill="#5cb2e0" font-family="Inter,ui-sans-serif,sans-serif" font-size="72" font-weight="900" letter-spacing="-2">Matic</text>

    <!-- Tagline -->
    <text x="52" y="418" fill="#8ab0c4" font-family="Inter,ui-sans-serif,sans-serif" font-size="18" font-weight="400" letter-spacing="0.02em">Route numbers. Feed the core.</text>

    <!-- Divider -->
    <rect x="52" y="438" width="280" height="2" rx="1" fill="rgba(92,178,224,0.2)"/>

    <!-- Feature pills -->
    <g font-family="Inter,ui-sans-serif,sans-serif" font-size="12" font-weight="500">
      <rect x="52" y="454" width="80" height="22" rx="11" fill="rgba(66,220,28,0.1)" stroke="rgba(66,220,28,0.3)" stroke-width="1"/>
      <text x="92" y="465" text-anchor="middle" dominant-baseline="central" fill="#42dc1c">+ Add</text>

      <rect x="142" y="454" width="82" height="22" rx="11" fill="rgba(66,220,28,0.1)" stroke="rgba(66,220,28,0.3)" stroke-width="1"/>
      <text x="183" y="465" text-anchor="middle" dominant-baseline="central" fill="#42dc1c">× Multiply</text>

      <rect x="234" y="454" width="82" height="22" rx="11" fill="rgba(66,220,28,0.1)" stroke="rgba(66,220,28,0.3)" stroke-width="1"/>
      <text x="275" y="465" text-anchor="middle" dominant-baseline="central" fill="#42dc1c">÷ Divide</text>

      <rect x="52" y="484" width="104" height="22" rx="11" fill="rgba(66,220,28,0.1)" stroke="rgba(66,220,28,0.3)" stroke-width="1"/>
      <text x="104" y="495" text-anchor="middle" dominant-baseline="central" fill="#42dc1c">^ Exponentiate</text>

      <rect x="166" y="484" width="98" height="22" rx="11" fill="rgba(92,178,224,0.1)" stroke="rgba(92,178,224,0.3)" stroke-width="1"/>
      <text x="215" y="495" text-anchor="middle" dominant-baseline="central" fill="#5cb2e0">30 Objectives</text>
    </g>

    <!-- Level badges at bottom -->
    <text x="52" y="588" fill="#5a7e94" font-family="Inter,ui-sans-serif,sans-serif" font-size="12" letter-spacing="0.05em">UNLOCK MACHINES AS YOU ADVANCE</text>
    <g font-family="ui-monospace,monospace" font-size="13" font-weight="700">
      <circle cx="66"  cy="618" r="14" fill="#12bfc8" stroke="#02191d" stroke-width="1.5"/>
      <text x="66"  y="618" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="9">SRC</text>
      <circle cx="100" cy="618" r="14" fill="#42dc1c" stroke="#061805" stroke-width="1.5"/>
      <text x="100" y="618" text-anchor="middle" dominant-baseline="central" fill="#071208" font-size="14">+</text>
      <circle cx="134" cy="618" r="14" fill="#42dc1c" stroke="#061805" stroke-width="1.5"/>
      <text x="134" y="618" text-anchor="middle" dominant-baseline="central" fill="#071208" font-size="13">×</text>
      <circle cx="168" cy="618" r="14" fill="#42dc1c" stroke="#061805" stroke-width="1.5"/>
      <text x="168" y="618" text-anchor="middle" dominant-baseline="central" fill="#071208" font-size="12">−</text>
      <circle cx="202" cy="618" r="14" fill="#42dc1c" stroke="#061805" stroke-width="1.5"/>
      <text x="202" y="618" text-anchor="middle" dominant-baseline="central" fill="#071208" font-size="12">÷</text>
      <circle cx="236" cy="618" r="14" fill="#42dc1c" stroke="#061805" stroke-width="1.5"/>
      <text x="236" y="618" text-anchor="middle" dominant-baseline="central" fill="#071208" font-size="11">xⁿ</text>
      <circle cx="270" cy="618" r="14" fill="#1a4a8a" stroke="#0a1a30" stroke-width="1.5"/>
      <text x="270" y="618" text-anchor="middle" dominant-baseline="central" fill="#c0d8ff" font-size="8">STR</text>
    </g>
  </svg>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     SQUARE  630 × 630
═══════════════════════════════════════════════════════════════ -->
<div class="cover-wrap">
  <h2>Square — 630 × 630</h2>
  <svg xmlns="http://www.w3.org/2000/svg" width="630" height="630" viewBox="0 0 630 630">
    <defs>
      <linearGradient id="bg-sq" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%"  stop-color="#0b1f2e"/>
        <stop offset="55%" stop-color="#12354f"/>
        <stop offset="100%" stop-color="#0b2233"/>
      </linearGradient>
      <radialGradient id="vignette-sq" cx="50%" cy="50%" r="70%">
        <stop offset="0%"  stop-color="transparent"/>
        <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
      </radialGradient>
      <filter id="glow-sq-gold" x="-80%" y="-80%" width="360%" height="360%">
        <feGaussianBlur stdDeviation="5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-sq-red" x="-80%" y="-80%" width="360%" height="360%">
        <feGaussianBlur stdDeviation="10" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-sq-green" x="-80%" y="-80%" width="360%" height="360%">
        <feGaussianBlur stdDeviation="7" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <rect width="630" height="630" fill="url(#bg-sq)"/>

    <!-- Grid lines -->
    <g stroke="#5cb2e0" stroke-width="0.5" opacity="0.12">
      <line x1="0"   y1="45"  x2="630" y2="45"/>  <line x1="0"   y1="90"  x2="630" y2="90"/>
      <line x1="0"   y1="135" x2="630" y2="135"/> <line x1="0"   y1="180" x2="630" y2="180"/>
      <line x1="0"   y1="225" x2="630" y2="225"/> <line x1="0"   y1="270" x2="630" y2="270"/>
      <line x1="0"   y1="315" x2="630" y2="315"/> <line x1="0"   y1="360" x2="630" y2="360"/>
